version: '3.8'

services:
  bff:
    image: aaligerd/test-bff:latest
    container_name: news-bff-test
    ports:
      - "9595:9595"
    env_file:
      - .env 
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9595/bff/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3